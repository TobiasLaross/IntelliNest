name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install tools
        run: brew install xcbeautify swiftlint

      - name: SwiftFormat
        run: |
          BuildTools/SwiftFormat/swiftformat . --indent 4
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -am "Applied SwiftFormat"
            git push
          fi

      - name: SwiftLint
        run: swiftlint --config .swiftlint

      - name: Build and Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project IntelliNest.xcodeproj \
            -scheme "IntelliNest-github" \
            -testPlan "IntelliNest-github" \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -configuration "Github actions" \
            -parallel-testing-enabled YES \
            -maximum-parallel-testing-workers 2 \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
          retention-days: 7
